<f:layout name="Backend/Default"/>

<f:section name="Content">
	<f:asset.script identifier="sg-apicore-token-copy" src="EXT:sg_apicore/Resources/Public/JavaScript/token-copy.js"/>
	<f:variable name="resolvedReturnUrl" value="{returnUrl}"/>
	<f:if condition="{isRegenerated}">
		<f:then><h1>Token Regenerated</h1></f:then>
		<f:else><h1>Token Created</h1></f:else>
	</f:if>
	<div class="alert alert-warning">
		<f:if condition="{isRegenerated}">
			<f:then><h4 class="alert-heading">Copy your new token key now!</h4></f:then>
			<f:else><h4 class="alert-heading">Copy your token key now!</h4></f:else>
		</f:if>
		<p>For security reasons, this token will only be shown <strong>once</strong>. We store only a SHA-256 hash of
			it.</p>
		<hr>
		<div class="input-group">
			<input type="text" class="form-control form-control-lg" value="{tokenKey}" readonly id="tokenKey"
				   data-token-copy-input>
			<div class="input-group-append">
				<button class="btn btn-outline-secondary" type="button" data-token-copy-button>Copy</button>
			</div>
		</div>
		<div class="mt-2 text-success" data-token-copy-feedback hidden>Token copied to clipboard.</div>
	</div>

	<f:if condition="!{isRegenerated}">
		<h3>Details</h3>
		<table class="table table-bordered">
			<tr>
				<th>API ID</th>
				<td>{apiId}</td>
			</tr>
			<tr>
				<th>Tenant ID</th>
				<td>{tenantId}</td>
			</tr>
		</table>
	</f:if>

	<a href="{resolvedReturnUrl}" class="btn btn-primary">Back to
		Token Management</a>
</f:section>
